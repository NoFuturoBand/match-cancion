<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NO FUTURO</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{

    background:#000000;
    color:#ffffff;

    font-family: Helvetica, Arial, sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:25px;

}

/* CONTAINER */
.container{

    width:100%;
    max-width:520px;

    text-align:center;

}

/* LOGO */
.logo{

    width:220px;

    max-width:80%;

    margin:0 auto 35px auto;

    display:block;

}

/* TITLE */
h1{

    font-size:48px;

    letter-spacing:3px;

    margin-bottom:12px;

    font-weight:bold;

}

/* SUBTITLE */
.subtitle{

    font-size:17px;

    line-height:1.6;

    color:#cccccc;

    margin-bottom:45px;

}

/* BUTTONS */
.link-button{

    display:block;

    width:100%;

    padding:20px;

    margin-bottom:18px;

    border:2px solid white;

    text-decoration:none;

    color:white;

    font-size:18px;

    font-weight:bold;

    letter-spacing:1px;

    transition:0.2s;

}

/* HOVER */
.link-button:hover{

    background:#ff0000;

    border-color:#ff0000;

    color:white;

}

/* MOBILE */
@media(max-width:480px){

    h1{
        font-size:38px;
    }

    .subtitle{
        font-size:16px;
    }

    .link-button{
        font-size:17px;
        padding:18px;
    }

}


/* SOCIALS */

.socials{

    display:flex;

    justify-content:center;

    gap:22px;

    margin-bottom:50px;

}

/* ICONS */

.social-icon{

    width:34px;

    height:34px;

    object-fit:contain;

    transition:0.2s;

}

/* HOVER */

.social-icon:hover{

    transform:scale(1.15);

    opacity:0.8;

}

    
</style>

</head>

<body>

<div class="container">

    <div class="logo">
    <img src="assets/logo.jpg" class="logo">

        
    </div>

    <h1>NO FUTURO</h1>

    <p class="subtitle">
        Punk triste desde Bogotá.
    </p>

<div class="socials">

    <a href="https://www.instagram.com/nofuturoband" target="_blank">
        <img src="assets/instagram.png" class="social-icon">
    </a>

    <a href="https://www.tiktok.com/@nofuturoband" target="_blank">
        <img src="assets/tik-tok.png" class="social-icon">
    </a>

    <a href="mailto:nofuturoband@gmail.com">
        <img src="assets/mail.png" class="social-icon">
    </a>

</div>

    
    <a class="link-button" href="#">
        ESCUCHAR EN SPOTIFY
    </a>

    <a class="link-button" href="#">
        VER VIDEOCLIP
    </a>

    <a class="link-button" href="#">
        INSTAGRAM
    </a>

    <a class="link-button" href="#">
        YOUTUBE
    </a>

    <a class="link-button" href="quiz.html">
        HACER EL QUIZ
    </a>

</div>

</body>
</html>
